name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Testes e validacoes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cinereserve
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres456
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cinereserve"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://postgres:postgres456@localhost:5432/cinereserve
      REDIS_URL: redis://localhost:6379/0
      CELERY_TASK_ALWAYS_EAGER: "1"
      CELERY_TASK_EAGER_PROPAGATES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar Poetry
        run: pip install poetry==2.1.1

      - name: Instalar dependencias
        run: poetry install --no-interaction --no-ansi --no-root

      - name: Validar configuracao Django
        run: poetry run python manage.py check

      - name: Validar migrations pendentes
        run: poetry run python manage.py makemigrations --check --dry-run

      - name: Rodar testes
        run: poetry run python manage.py test -v 2
